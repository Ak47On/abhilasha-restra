<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<input id="name" placeholder="Item Name">
<input id="price" placeholder="Price">

<select id="status">

</select>

<select id="image">
<option value="images/paneer/paneer-chilli.jpg">Paneer Chilli</option>

<option value="images/thali/veg-thali.jpg">Veg Thali</option>
</select>

<button onclick="add()">Add Item</button>

<script src="js/admin.js"></script>
</body>
</html>
